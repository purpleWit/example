<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Зайчик и морковки</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { overflow:hidden; touch-action:none; font-family:Arial,sans-serif; }
canvas { display:block; }
#ui { position:fixed; top:12px; left:50%; transform:translateX(-50%);
      display:flex; gap:12px; pointer-events:none; z-index:10; }
.card { background:rgba(255,255,255,.88); border-radius:12px;
        padding:6px 16px; font-size:16px; font-weight:bold; color:#333;
        box-shadow:0 2px 8px rgba(0,0,0,.2); white-space:nowrap; }
#win { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
       align-items:center; justify-content:center; z-index:20; }
#win.show { display:flex; }
.wbox { background:#fff; border-radius:20px; padding:32px 48px;
        text-align:center; font-size:22px; font-weight:bold; }
.wbox p { font-size:15px; margin-top:8px; color:#555; }
.wbox button { margin-top:18px; padding:14px 36px; font-size:17px;
               background:#4CAF50; color:#fff; border:none;
               border-radius:10px; cursor:pointer; font-weight:bold; }
#joy { position:fixed; bottom:24px; left:24px; z-index:10; width:120px; height:120px; }
#jbase { width:120px; height:120px; border-radius:60px;
         background:rgba(255,255,255,.25); border:3px solid rgba(255,255,255,.5);
         position:absolute; }
#jstick { width:48px; height:48px; border-radius:24px;
          background:rgba(255,255,255,.75); border:3px solid rgba(255,255,255,.9);
          position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
#bjump { position:fixed; bottom:40px; right:28px; z-index:10;
         width:70px; height:70px; border-radius:35px;
         background:rgba(255,255,255,.35); border:3px solid rgba(255,255,255,.7);
         font-size:26px; line-height:64px; text-align:center;
         user-select:none; -webkit-user-select:none; }
#hint { position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
        background:rgba(255,255,255,.75); border-radius:8px; padding:5px 14px;
        font-size:12px; color:#444; pointer-events:none; }
@media (pointer:coarse) { #hint { display:none; } }
@media (pointer:fine)   { #joy, #bjump { display:none; } }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div class="card">🥕 <span id="score">0</span>/<span id="total">0</span></div>
  <div class="card">⏱ <span id="timer">0</span>с</div>
</div>
<div id="win">
  <div class="wbox">🎉 Зайчик сыт! 🐰
    <p>Все морковки съедены за <span id="ftime"></span> с!</p>
    <button onclick="restart()">Играть снова</button>
  </div>
</div>
<div id="joy"><div id="jbase"></div><div id="jstick"></div></div>
<div id="bjump">🐰</div>
<div id="hint">WASD — движение &nbsp;|&nbsp; Мышь — камера &nbsp;|&nbsp; Пробел — прыжок</div>
<script>
'use strict';
const CV = document.getElementById('c');
const ctx = CV.getContext('2d');
let W = CV.width = innerWidth, H = CV.height = innerHeight;
addEventListener('resize', () => { W = CV.width = innerWidth; H = CV.height = innerHeight; });

// ── Colour helpers ────────────────────────────────────────────────────────────
const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));
function shade(hex, amt) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = clamp(((n>>16)&255)+amt,0,255);
  const g = clamp(((n>>8)&255)+amt,0,255);
  const b = clamp((n&255)+amt,0,255);
  return `rgb(${r},${g},${b})`;
}

// ── 3D engine ─────────────────────────────────────────────────────────────────
const FOV = 370;
let camX=0, camY=5, camZ=10, camYaw=Math.PI, camPitch=0.3;

function toCamera(wx,wy,wz) {
  let dx=wx-camX, dy=wy-camY, dz=wz-camZ;
  const cy=Math.cos(-camYaw), sy=Math.sin(-camYaw);
  let rx=dx*cy-dz*sy, rz=dx*sy+dz*cy;
  const cp=Math.cos(-camPitch), sp=Math.sin(-camPitch);
  let ry=dy*cp-rz*sp; rz=dy*sp+rz*cp;
  return [rx,ry,rz];
}
function project(wx,wy,wz) {
  const [rx,ry,rz] = toCamera(wx,wy,wz);
  if (rz<=0.2) return null;
  const f=FOV/rz;
  return { sx:rx*f+W*.5, sy:-ry*f+H*.5, z:rz };
}
function avgDepth(verts) {
  let s=0; for (const [x,y,z] of verts) s+=toCamera(x,y,z)[2];
  return s/verts.length;
}
function renderFace(verts, color) {
  const pts = verts.map(([x,y,z])=>project(x,y,z));
  const valid = pts.filter(p=>p);
  if (valid.length<3) return;
  ctx.beginPath();
  ctx.moveTo(valid[0].sx, valid[0].sy);
  for (let i=1;i<valid.length;i++) ctx.lineTo(valid[i].sx, valid[i].sy);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

// Build box: 6 faces, vertices rotated by yaw around box centre
function makeBox(ox,oy,oz, w,h,d, color, yaw=0) {
  const hw=w/2,hh=h/2,hd=d/2;
  const cy=Math.cos(yaw), sy=Math.sin(yaw);
  const rv=(x,y,z)=>[ox+x*cy-z*sy, oy+y, oz+x*sy+z*cy];
  const v=[
    rv(-hw,-hh,-hd),rv(hw,-hh,-hd),rv(hw,hh,-hd),rv(-hw,hh,-hd),
    rv(-hw,-hh,hd), rv(hw,-hh,hd), rv(hw,hh,hd), rv(-hw,hh,hd),
  ];
  return [
    {verts:[v[0],v[1],v[2],v[3]], color},
    {verts:[v[5],v[4],v[7],v[6]], color:shade(color,-35)},
    {verts:[v[4],v[0],v[3],v[7]], color:shade(color,-18)},
    {verts:[v[1],v[5],v[6],v[2]], color:shade(color,-18)},
    {verts:[v[3],v[2],v[6],v[7]], color:shade(color,28)},
    {verts:[v[4],v[5],v[1],v[0]], color:shade(color,-45)},
  ];
}

// ── Static world ──────────────────────────────────────────────────────────────
const FIELD = 45;
const staticFaces = [];
staticFaces.push({verts:[[-FIELD,0,-FIELD],[FIELD,0,-FIELD],[FIELD,0,FIELD],[-FIELD,0,FIELD]], color:'#4CAF50'});

const treePoses = [];
for (let i=0;i<16;i++) {
  let tx,tz;
  do { tx=(Math.random()-.5)*80; tz=(Math.random()-.5)*80; } while(Math.hypot(tx,tz)<10);
  treePoses.push([tx,tz]);
  staticFaces.push(...makeBox(tx,0.75,tz, 0.4,1.5,0.4, '#795548'));
  staticFaces.push(...makeBox(tx,2.5,tz,  2.2,1.8,2.2, '#2E7D32'));
  staticFaces.push(...makeBox(tx,3.9,tz,  1.5,1.3,1.5, '#388E3C'));
}

// ── Carrots ───────────────────────────────────────────────────────────────────
const NCARROTS = 12;
let carrotList = [];
function spawnCarrots() {
  carrotList = [];
  for (let i=0;i<NCARROTS;i++) {
    let cx,cz;
    do {
      cx=(Math.random()-.5)*75; cz=(Math.random()-.5)*75;
    } while(Math.hypot(cx,cz)<4 || treePoses.some(([tx,tz])=>Math.hypot(cx-tx,cz-tz)<2.5));
    carrotList.push({x:cx,z:cz,alive:true});
  }
}
spawnCarrots();
document.getElementById('total').textContent = NCARROTS;

function getCarrotFaces() {
  const f=[];
  for (const c of carrotList) {
    if (!c.alive) continue;
    f.push(...makeBox(c.x,0.35,c.z, 0.3,0.7,0.3, '#FF6D00'));
    f.push(...makeBox(c.x,0.88,c.z, 0.15,0.4,0.15, '#33691E'));
  }
  return f;
}

// ── Bunny ─────────────────────────────────────────────────────────────────────
const bunny = {x:0,y:0,z:0,yaw:0,velY:0,jumping:false,bobT:0};
function getBunnyFaces() {
  const {x,y,z,yaw,bobT}=bunny, f=[];
  function part(ox,oy,oz,w,h,d,col) {
    const cy=Math.cos(yaw),sy=Math.sin(yaw);
    f.push(...makeBox(x+ox*cy-oz*sy, y+oy, z+ox*sy+oz*cy, w,h,d, col, yaw));
  }
  const s=Math.sin(bobT)*0.06;
  part(0,   0.55,0,    0.72,0.78,0.98,'#f0f0f0');
  part(0,   1.32,0.25, 0.58,0.52,0.52,'#f0f0f0');
  part(0,   0.60,-0.52,0.22,0.22,0.22,'#ffffff');
  part(-0.15,1.90,0.20,0.13,0.55,0.13,'#f0f0f0');
  part( 0.15,1.90,0.20,0.13,0.55,0.13,'#f0f0f0');
  part(-0.22,0.15+s, 0.28,0.15,0.32,0.15,'#e0e0e0');
  part( 0.22,0.15-s, 0.28,0.15,0.32,0.15,'#e0e0e0');
  part(-0.22,0.15-s,-0.28,0.15,0.32,0.15,'#e0e0e0');
  part( 0.22,0.15+s,-0.28,0.15,0.32,0.15,'#e0e0e0');
  part(0,    1.22,0.52, 0.11,0.09,0.06,'#ff80ab');
  return f;
}

// ── Controls ──────────────────────────────────────────────────────────────────
const keys={};
addEventListener('keydown',e=>{ keys[e.code]=true; e.preventDefault(); });
addEventListener('keyup',  e=>{ keys[e.code]=false; });

CV.addEventListener('click',()=>CV.requestPointerLock());
document.addEventListener('mousemove',e=>{
  if (document.pointerLockElement!==CV) return;
  camYaw  -= e.movementX*0.003;
  camPitch = clamp(camPitch+e.movementY*0.002,0.08,0.72);
});

// Joystick
const jzone=document.getElementById('joy');
const jstick=document.getElementById('jstick');
const JMAX=38;
const joy={active:false,id:-1,ox:0,oy:0,dx:0,dy:0};
jzone.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.changedTouches[0], r=jzone.getBoundingClientRect();
  joy.active=true; joy.id=t.identifier;
  joy.ox=r.left+r.width/2; joy.oy=r.top+r.height/2; joy.dx=joy.dy=0;
},{passive:false});
function joyMove(e){ if(!joy.active)return; e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier!==joy.id)continue;
    let dx=t.clientX-joy.ox, dy=t.clientY-joy.oy;
    const len=Math.hypot(dx,dy); if(len>JMAX){dx=dx/len*JMAX;dy=dy/len*JMAX;}
    joy.dx=dx; joy.dy=dy;
    jstick.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;
  }
}
function joyEnd(e){ for(const t of e.changedTouches) if(t.identifier===joy.id){
  joy.active=false; joy.dx=joy.dy=0; jstick.style.transform='translate(-50%,-50%)';
}}
document.addEventListener('touchmove',joyMove,{passive:false});
document.addEventListener('touchend',joyEnd);
document.addEventListener('touchcancel',joyEnd);

// Camera swipe
const camT={active:false,id:-1,lx:0,ly:0};
CV.addEventListener('touchstart',e=>{ e.preventDefault();
  for(const t of e.changedTouches){ if(camT.active)continue;
    const jr=jzone.getBoundingClientRect();
    if(!(t.clientX>=jr.left&&t.clientX<=jr.right&&t.clientY>=jr.top&&t.clientY<=jr.bottom))
    { camT.active=true; camT.id=t.identifier; camT.lx=t.clientX; camT.ly=t.clientY; }
  }
},{passive:false});
CV.addEventListener('touchmove',e=>{ e.preventDefault();
  for(const t of e.changedTouches){ if(t.identifier!==camT.id)continue;
    camYaw  -= (t.clientX-camT.lx)*0.005;
    camPitch = clamp(camPitch+(t.clientY-camT.ly)*0.004,0.08,0.72);
    camT.lx=t.clientX; camT.ly=t.clientY;
  }
},{passive:false});
CV.addEventListener('touchend',e=>{ for(const t of e.changedTouches) if(t.identifier===camT.id) camT.active=false; });

// Jump button
let touchJump=false;
const bjump=document.getElementById('bjump');
bjump.addEventListener('touchstart',e=>{e.preventDefault();touchJump=true;},{passive:false});
bjump.addEventListener('touchend',  e=>{e.preventDefault();touchJump=false;},{passive:false});

// ── Game ──────────────────────────────────────────────────────────────────────
let score=0, startT=Date.now(), over=false;
const SPEED=7, CRAD=1.3, HLIM=43;

function update(dt) {
  if(over)return;
  document.getElementById('timer').textContent=((Date.now()-startT)/1000)|0;
  const fwdX=-Math.sin(camYaw), fwdZ=-Math.cos(camYaw);
  const rgtX= Math.cos(camYaw), rgtZ=-Math.sin(camYaw);
  let mx=0,mz=0;
  if(keys['KeyW']||keys['ArrowUp'])   {mx+=fwdX;mz+=fwdZ;}
  if(keys['KeyS']||keys['ArrowDown']) {mx-=fwdX;mz-=fwdZ;}
  if(keys['KeyA']||keys['ArrowLeft']) {mx-=rgtX;mz-=rgtZ;}
  if(keys['KeyD']||keys['ArrowRight']){mx+=rgtX;mz+=rgtZ;}
  if(joy.active&&(Math.abs(joy.dx)>4||Math.abs(joy.dy)>4)){
    const nx=joy.dx/JMAX, ny=joy.dy/JMAX;
    mx+=fwdX*(-ny)+rgtX*nx; mz+=fwdZ*(-ny)+rgtZ*nx;
  }
  const len=Math.hypot(mx,mz), moving=len>0.01;
  if(moving){
    mx/=len; mz/=len;
    bunny.x=clamp(bunny.x+mx*SPEED*dt,-HLIM,HLIM);
    bunny.z=clamp(bunny.z+mz*SPEED*dt,-HLIM,HLIM);
    bunny.yaw=Math.atan2(-mx,-mz);
    bunny.bobT+=dt*9;
  }
  if((keys['Space']||keys['KeyF']||touchJump)&&!bunny.jumping){bunny.velY=6;bunny.jumping=true;}
  bunny.velY-=18*dt; bunny.y=Math.max(0,bunny.y+bunny.velY*dt);
  if(bunny.y<=0){bunny.velY=0;bunny.jumping=false;}
  for(const c of carrotList){ if(!c.alive)continue;
    if(Math.hypot(bunny.x-c.x,bunny.z-c.z)<CRAD){
      c.alive=false; score++;
      document.getElementById('score').textContent=score;
      if(score>=NCARROTS){
        over=true;
        document.getElementById('ftime').textContent=((Date.now()-startT)/1000).toFixed(1);
        document.getElementById('win').classList.add('show');
      }
    }
  }
}

function render() {
  const CAM_D=9;
  camX=bunny.x+Math.sin(camYaw)*CAM_D*Math.cos(camPitch);
  camY=bunny.y+0.8+Math.sin(camPitch)*CAM_D;
  camZ=bunny.z+Math.cos(camYaw)*CAM_D*Math.cos(camPitch);

  const sky=ctx.createLinearGradient(0,0,0,H*.75);
  sky.addColorStop(0,'#3A86C8'); sky.addColorStop(1,'#B8DFFA');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  const all=[...staticFaces,...getCarrotFaces(),...getBunnyFaces()];
  all.sort((a,b)=>avgDepth(b.verts)-avgDepth(a.verts));
  for(const f of all) renderFace(f.verts,f.color);
}

let prev=0;
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-prev)/1000,0.05); prev=now;
  update(dt); render();
}
requestAnimationFrame(loop);

function restart(){
  score=0; over=false;
  Object.assign(bunny,{x:0,y:0,z:0,yaw:0,velY:0,jumping:false,bobT:0});
  startT=Date.now(); spawnCarrots();
  document.getElementById('score').textContent=0;
  document.getElementById('win').classList.remove('show');
}
window.restart=restart;
</script>
</body>
</html>
