<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Зайчик и морковки</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #87CEEB; font-family: Arial, sans-serif; }
    canvas { display: block; }
    #ui {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 24px; align-items: center; pointer-events: none;
    }
    .card {
      background: rgba(255,255,255,0.85); border-radius: 12px;
      padding: 8px 20px; font-size: 18px; font-weight: bold; color: #333;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    #win {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    }
    #win.show { display: flex; }
    .win-box {
      background: white; border-radius: 20px; padding: 40px 60px;
      text-align: center; font-size: 28px; font-weight: bold;
    }
    .win-box p { font-size: 18px; margin-top: 8px; color: #555; }
    .win-box button {
      margin-top: 20px; padding: 12px 32px; font-size: 18px;
      background: #4CAF50; color: white; border: none;
      border-radius: 10px; cursor: pointer; font-weight: bold;
    }
    .win-box button:hover { background: #388E3C; }
    #controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.75); border-radius: 10px;
      padding: 8px 20px; font-size: 14px; color: #444; pointer-events: none;
    }
  </style>
</head>
<body>
<div id="ui">
  <div class="card">🥕 Морковок: <span id="score">0</span> / <span id="total">0</span></div>
  <div class="card">⏱ <span id="timer">0</span> с</div>
</div>

<div id="win">
  <div class="win-box">
    🎉 Зайчик сыт! 🐰<br>
    <p>Все морковки съедены за <span id="finalTime"></span> секунд!</p>
    <button onclick="restartGame()">Играть снова</button>
  </div>
</div>

<div id="controls">WASD / стрелки — движение &nbsp;|&nbsp; Мышь — камера</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── Scene setup ───────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 40, 120);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 6, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── Lighting ───────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff5e0, 1.2);
sun.position.set(30, 60, 20);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -60;
sun.shadow.camera.right = 60;
sun.shadow.camera.top = 60;
sun.shadow.camera.bottom = -60;
scene.add(sun);

// ─── Ground ─────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(100, 100, 40, 40);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ─── Grass tufts ────────────────────────────────────────────────────────────
const grassMat = new THREE.MeshLambertMaterial({ color: 0x388E3C });
for (let i = 0; i < 200; i++) {
  const x = (Math.random() - 0.5) * 90;
  const z = (Math.random() - 0.5) * 90;
  const h = 0.2 + Math.random() * 0.3;
  const g = new THREE.Mesh(
    new THREE.ConeGeometry(0.08 + Math.random() * 0.1, h, 4),
    grassMat
  );
  g.position.set(x, h / 2, z);
  g.rotation.y = Math.random() * Math.PI;
  scene.add(g);
}

// ─── Clouds ─────────────────────────────────────────────────────────────────
const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
function makeCloud(x, y, z) {
  const g = new THREE.Group();
  const parts = [
    [0, 0, 0, 2.5, 1.2],
    [-2, -0.2, 0, 1.8, 1],
    [2, -0.2, 0, 1.8, 1],
    [-1, 0.4, 0, 1.5, 0.9],
    [1, 0.4, 0, 1.5, 0.9],
  ];
  for (const [px, py, pz, rx, ry] of parts) {
    const m = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 6), cloudMat);
    m.scale.set(rx, ry, 1);
    m.position.set(px, py, pz);
    g.add(m);
  }
  g.position.set(x, y, z);
  scene.add(g);
  return g;
}
const clouds = [];
for (let i = 0; i < 8; i++) {
  clouds.push(makeCloud(
    (Math.random() - 0.5) * 100,
    15 + Math.random() * 10,
    (Math.random() - 0.5) * 100
  ));
}

// ─── Trees ──────────────────────────────────────────────────────────────────
const trunkMat = new THREE.MeshLambertMaterial({ color: 0x795548 });
const leafMat = new THREE.MeshLambertMaterial({ color: 0x2E7D32 });
function makeTree(x, z) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 1.5, 8), trunkMat);
  trunk.position.y = 0.75;
  trunk.castShadow = true;
  g.add(trunk);
  for (let i = 0; i < 3; i++) {
    const r = 1.2 - i * 0.2;
    const h = 1.8 - i * 0.3;
    const cone = new THREE.Mesh(new THREE.ConeGeometry(r, h, 8), leafMat);
    cone.position.y = 1.5 + i * 0.8;
    cone.castShadow = true;
    g.add(cone);
  }
  g.position.set(x, 0, z);
  scene.add(g);
}
const treePositions = [];
for (let i = 0; i < 18; i++) {
  let x, z;
  do { x = (Math.random() - 0.5) * 85; z = (Math.random() - 0.5) * 85; }
  while (Math.hypot(x, z) < 8);
  treePositions.push([x, z]);
  makeTree(x, z);
}

// ─── Bunny ──────────────────────────────────────────────────────────────────
const bunnyMat = new THREE.MeshLambertMaterial({ color: 0xf5f5f5 });
const noseMat = new THREE.MeshLambertMaterial({ color: 0xff80ab });
const eyeMat = new THREE.MeshLambertMaterial({ color: 0x212121 });
const bunny = new THREE.Group();

// body
const bodyMesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 12, 10), bunnyMat);
bodyMesh.scale.y = 1.1;
bodyMesh.position.y = 0.5;
bodyMesh.castShadow = true;
bunny.add(bodyMesh);

// head
const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.35, 12, 10), bunnyMat);
headMesh.position.set(0, 1.2, 0.2);
headMesh.castShadow = true;
bunny.add(headMesh);

// ears
function makeEar(side) {
  const ear = new THREE.Group();
  const outer = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.5, 4, 8), bunnyMat);
  outer.castShadow = true;
  ear.add(outer);
  const inner = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.4, 4, 8), noseMat);
  inner.position.z = 0.04;
  ear.add(inner);
  ear.position.set(side * 0.18, 1.72, 0.1);
  ear.rotation.z = side * 0.15;
  bunny.add(ear);
}
makeEar(-1); makeEar(1);

// tail
const tail = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), bunnyMat);
tail.position.set(0, 0.5, -0.48);
tail.castShadow = true;
bunny.add(tail);

// nose
const nose = new THREE.Mesh(new THREE.SphereGeometry(0.05, 8, 8), noseMat);
nose.position.set(0, 1.12, 0.52);
bunny.add(nose);

// eyes
[-0.14, 0.14].forEach(sx => {
  const eye = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), eyeMat);
  eye.position.set(sx, 1.26, 0.5);
  bunny.add(eye);
});

// legs
function makeLeg(x, z, name) {
  const leg = new THREE.Mesh(new THREE.CapsuleGeometry(0.09, 0.3, 4, 8), bunnyMat);
  leg.position.set(x, 0.15, z);
  leg.castShadow = true;
  leg.name = name;
  bunny.add(leg);
  return leg;
}
const legFL = makeLeg(-0.2, 0.3, 'legFL');
const legFR = makeLeg(0.2, 0.3, 'legFR');
const legBL = makeLeg(-0.22, -0.3, 'legBL');
const legBR = makeLeg(0.22, -0.3, 'legBR');

bunny.position.set(0, 0, 0);
scene.add(bunny);

// ─── Carrots ────────────────────────────────────────────────────────────────
const carrotMat = new THREE.MeshLambertMaterial({ color: 0xFF6D00 });
const leafCarrotMat = new THREE.MeshLambertMaterial({ color: 0x33691E });
const CARROT_COUNT = 15;
const carrots = [];

function spawnCarrot() {
  const g = new THREE.Group();

  const body = new THREE.Mesh(new THREE.ConeGeometry(0.18, 0.7, 8), carrotMat);
  body.rotation.x = Math.PI;
  body.position.y = 0.35;
  body.castShadow = true;
  g.add(body);

  for (let i = 0; i < 3; i++) {
    const lf = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.35, 6), leafCarrotMat);
    lf.position.set(
      Math.sin(i * 2.1) * 0.07,
      0.8,
      Math.cos(i * 2.1) * 0.07
    );
    lf.rotation.z = (Math.random() - 0.5) * 0.6;
    lf.rotation.x = (Math.random() - 0.5) * 0.3;
    g.add(lf);
  }

  let x, z;
  do { x = (Math.random() - 0.5) * 80; z = (Math.random() - 0.5) * 80; }
  while (Math.hypot(x, z) < 3 || treePositions.some(([tx, tz]) => Math.hypot(x - tx, z - tz) < 2));

  g.position.set(x, 0, z);
  g.userData.alive = true;
  scene.add(g);
  carrots.push(g);
}

for (let i = 0; i < CARROT_COUNT; i++) spawnCarrot();

document.getElementById('total').textContent = CARROT_COUNT;

// ─── Controls ───────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mouse look
let yaw = 0;
let pitch = 0.25;
const canvas = renderer.domElement;
canvas.addEventListener('click', () => canvas.requestPointerLock());
document.addEventListener('pointerlockchange', () => {});
document.addEventListener('mousemove', e => {
  if (document.pointerLockElement === canvas) {
    yaw -= e.movementX * 0.003;
    pitch = Math.max(0.1, Math.min(0.7, pitch + e.movementY * 0.002));
  }
});

// ─── Game state ──────────────────────────────────────────────────────────────
let score = 0;
let startTime = performance.now();
let gameOver = false;
const SPEED = 6;
const CARROT_RADIUS = 1.2;
const FIELD_HALF = 48;

// ─── Particle pool ───────────────────────────────────────────────────────────
const particles = [];
function spawnParticles(pos) {
  for (let i = 0; i < 8; i++) {
    const p = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 4, 4),
      new THREE.MeshLambertMaterial({ color: 0xFF6D00 })
    );
    p.position.copy(pos).add(new THREE.Vector3(
      (Math.random() - 0.5) * 0.5, 0.3 + Math.random() * 0.5, (Math.random() - 0.5) * 0.5
    ));
    p.userData.vel = new THREE.Vector3(
      (Math.random() - 0.5) * 3, 2 + Math.random() * 3, (Math.random() - 0.5) * 3
    );
    p.userData.life = 1.0;
    scene.add(p);
    particles.push(p);
  }
}

// ─── Main loop ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
let bunnyVelY = 0;
let isJumping = false;
let bobTime = 0;

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!gameOver) {
    const elapsed = ((performance.now() - startTime) / 1000) | 0;
    document.getElementById('timer').textContent = elapsed;

    // Movement
    const dir = new THREE.Vector3();
    const forward = new THREE.Vector3(-Math.sin(yaw), 0, -Math.cos(yaw));
    const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    if (keys['KeyW'] || keys['ArrowUp'])    dir.add(forward);
    if (keys['KeyS'] || keys['ArrowDown'])  dir.sub(forward);
    if (keys['KeyA'] || keys['ArrowLeft'])  dir.sub(right);
    if (keys['KeyD'] || keys['ArrowRight']) dir.add(right);

    const moving = dir.lengthSq() > 0;
    if (moving) {
      dir.normalize().multiplyScalar(SPEED * dt);
      bunny.position.add(dir);
      bunny.position.x = Math.max(-FIELD_HALF, Math.min(FIELD_HALF, bunny.position.x));
      bunny.position.z = Math.max(-FIELD_HALF, Math.min(FIELD_HALF, bunny.position.z));
      bunny.rotation.y = Math.atan2(-dir.x, -dir.z);
      bobTime += dt * 8;
    }

    // Jump
    if ((keys['Space'] || keys['KeyF']) && !isJumping) {
      bunnyVelY = 6;
      isJumping = true;
    }
    bunnyVelY -= 18 * dt;
    bunny.position.y += bunnyVelY * dt;
    if (bunny.position.y < 0) {
      bunny.position.y = 0;
      bunnyVelY = 0;
      isJumping = false;
    }

    // Leg animation
    const swing = Math.sin(bobTime) * 0.4;
    legFL.rotation.x = swing;
    legFR.rotation.x = -swing;
    legBL.rotation.x = -swing;
    legBR.rotation.x = swing;

    // Body bob
    bodyMesh.position.y = 0.5 + (moving ? Math.abs(Math.sin(bobTime)) * 0.05 : 0);

    // Carrot collision
    for (const c of carrots) {
      if (!c.userData.alive) continue;
      const dx = bunny.position.x - c.position.x;
      const dz = bunny.position.z - c.position.z;
      if (Math.hypot(dx, dz) < CARROT_RADIUS) {
        c.userData.alive = false;
        scene.remove(c);
        score++;
        document.getElementById('score').textContent = score;
        spawnParticles(c.position);
        if (score >= CARROT_COUNT) {
          gameOver = true;
          const secs = ((performance.now() - startTime) / 1000).toFixed(1);
          document.getElementById('finalTime').textContent = secs;
          document.getElementById('win').classList.add('show');
        }
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.userData.life -= dt * 2;
    if (p.userData.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
    } else {
      p.userData.vel.y -= 10 * dt;
      p.position.addScaledVector(p.userData.vel, dt);
      p.material.opacity = p.userData.life;
    }
  }

  // Cloud drift
  const t = performance.now() * 0.0001;
  clouds.forEach((c, i) => { c.position.x += Math.sin(t + i) * 0.01; });

  // Camera follow
  const camDist = 10;
  const camHeight = camDist * Math.sin(pitch);
  const camBack = camDist * Math.cos(pitch);
  const target = bunny.position.clone().add(new THREE.Vector3(0, 1.2, 0));
  camera.position.set(
    target.x + Math.sin(yaw) * camBack,
    target.y + camHeight,
    target.z + Math.cos(yaw) * camBack
  );
  camera.lookAt(target);

  renderer.render(scene, camera);
}

// ─── Restart ─────────────────────────────────────────────────────────────────
function restartGame() {
  for (const c of carrots) scene.remove(c);
  carrots.length = 0;
  for (const p of particles) scene.remove(p);
  particles.length = 0;
  score = 0;
  gameOver = false;
  bunny.position.set(0, 0, 0);
  startTime = performance.now();
  bobTime = 0;
  for (let i = 0; i < CARROT_COUNT; i++) spawnCarrot();
  document.getElementById('score').textContent = 0;
  document.getElementById('win').classList.remove('show');
}

window.restartGame = restartGame;
animate();
</script>
</body>
</html>
